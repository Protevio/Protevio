<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="theme-color" content="#fefefe"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log In — Protevio AI</title>
<meta name="description" content="Log in to your Protevio AI account to search faces, manage alerts, and protect your digital identity."/>
<meta property="og:title" content="Log In to Protevio AI"/>
<meta property="og:description" content="Log in to your Protevio AI account to search faces, manage alerts, and protect your digital identity."/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://protevio.com/login.html"/>
<meta property="og:site_name" content="Protevio AI"/>
<meta property="og:image" content="https://protevio.com/og-image.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="canonical" href="https://protevio.com/login.html"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/protevio.css">
<link rel="stylesheet" href="auth.css">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebPage","name":"Log In – Protevio AI","description":"Log in to your Protevio AI account.","url":"https://protevio.com/login.html","publisher":{"@type":"Organization","name":"Protevio AI","url":"https://protevio.com"}}
</script>
</head>
<body>

<div class="p-glow"></div>

<a href="/" class="auth-back">
  <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Back to Home
</a>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">Protevio<span>.</span></div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Log in to your Protevio account</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Username or email</label>
        <input type="text" id="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
      </div>
      <div class="form-footer">
        <div class="remember-me">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>
        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="auth-btn auth-btn--primary"><span>Log In</span></button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Or</span>
      <div class="divider-line"></div>
    </div>

    <button class="auth-btn auth-btn--google" id="googleBtn">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span>Continue with Google</span>
    </button>

    <div class="auth-prompt">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</div>

<script>
const API = 'https://api.protevio.com/api';
const _redir = new URLSearchParams(window.location.search).get('redirect');

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = this.querySelector('button[type="submit"]');
  const btnText = btn.querySelector('span');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  btnText.textContent = 'Signing in...';
  btn.disabled = true;

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: email, password})
    });
    const data = await res.json();
    if (res.ok && data.token) {
      localStorage.setItem('protevio_token', data.token);
      if(data.refresh_token) localStorage.setItem('protevio_refresh', data.refresh_token);
      localStorage.setItem('protevio_user', JSON.stringify(data.user || {username: email}));
      window.location.href = _redir === 'results' ? '/results.html' : '/dashboard';
    } else if (res.status === 403 && data.requires_verification) {
      localStorage.setItem('protevio_verify_email', data.email || email);
      window.location.href = '/check-email?email=' + encodeURIComponent(data.email || email);
    } else {
      showError(data.error || 'Invalid email or password');
    }
  } catch(err) {
    showError('Connection error. Please try again.');
  } finally {
    btnText.textContent = 'Log In';
    btn.disabled = false;
  }
});

function showError(msg) {
  let el = document.querySelector('.auth-error');
  if (!el) {
    el = document.createElement('div');
    el.className = 'auth-error';
    document.getElementById('loginForm').prepend(el);
  }
  el.textContent = msg;
  setTimeout(() => el.remove(), 5000);
}

const GOOGLE_CLIENT_ID = '902178578189-e5gmfnandrvgkqs5aeotq3vn612vc3jf.apps.googleusercontent.com';
const gsiScript = document.createElement('script');
gsiScript.src = 'https://accounts.google.com/gsi/client';
gsiScript.async = true; gsiScript.defer = true;
document.head.appendChild(gsiScript);

gsiScript.onload = () => {
  google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleResponse });
};

document.getElementById('googleBtn').addEventListener('click', function() {
  if (!window.google?.accounts) { showError('Google Sign-In is loading, please try again.'); return; }
  google.accounts.id.prompt((n) => {
    if (n.isNotDisplayed()) {
      const div = document.createElement('div');
      div.id = 'g_btn_fallback';
      div.style.cssText = 'position:fixed;top:-9999px';
      document.body.appendChild(div);
      google.accounts.id.renderButton(div, {type:'standard', theme:'filled_black', size:'large'});
      setTimeout(() => {
        const inner = div.querySelector('div[role=button]') || div.querySelector('iframe');
        if (inner) inner.click();
        else showError('Please allow popups for Google Sign-In');
      }, 300);
    }
  });
});

async function handleGoogleResponse(response) {
  const btn = document.getElementById('googleBtn');
  btn.querySelector('span').textContent = 'Signing in...';
  btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/google', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ credential: response.credential })
    });
    const data = await res.json();
    if (res.ok && data.token) {
      localStorage.setItem('protevio_token', data.token);
      if(data.refresh_token) localStorage.setItem('protevio_refresh', data.refresh_token);
      localStorage.setItem('protevio_user', JSON.stringify(data.user || {}));
      window.location.href = _redir === 'results' ? '/results.html' : '/dashboard';
    } else {
      showError(data.error || 'Google sign-in failed');
    }
  } catch(err) {
    showError('Connection error. Please try again.');
  } finally {
    btn.querySelector('span').textContent = 'Continue with Google';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
