<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="theme-color" content="#fefefe"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up — Protevio AI</title>
<meta name="description" content="Create a free Protevio AI account to search faces, monitor matches, and protect your digital identity."/>
<meta property="og:title" content="Create a Protevio AI Account"/>
<meta property="og:description" content="Create a free Protevio AI account to search faces, monitor matches, and protect your digital identity."/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://protevio.com/signup.html"/>
<meta property="og:site_name" content="Protevio AI"/>
<meta property="og:image" content="https://protevio.com/og-image.png"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>
<link rel="canonical" href="https://protevio.com/signup.html"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/protevio.css">
<link rel="stylesheet" href="auth.css">
<style>
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.password-strength { display: flex; gap: 6px; margin-top: 8px; }
.strength-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; transition: background .3s; }
.strength-bar.weak { background: var(--red); }
.strength-bar.medium { background: var(--amber); }
.strength-bar.strong { background: var(--emerald); }
.checkbox-wrapper {
  display: flex; align-items: flex-start; gap: 10px;
  margin-bottom: 20px; font-size: .82rem; color: var(--ink-muted);
}
.checkbox-wrapper input { width: 16px; height: 16px; accent-color: var(--blue); cursor: pointer; margin-top: 2px; }
.checkbox-wrapper a { color: var(--blue); }
@media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
</style>
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"WebPage","name":"Sign Up – Protevio AI","description":"Create a free Protevio AI account.","url":"https://protevio.com/signup.html","publisher":{"@type":"Organization","name":"Protevio AI","url":"https://protevio.com"}}
</script>
</head>
<body>

<div class="p-glow"></div>

<a href="/" class="auth-back">
  <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Back to Home
</a>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">Protevio<span>.</span></div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Join Protevio and start searching</p>
    </div>

    <form id="signupForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="firstName">First name</label>
          <input type="text" id="firstName" class="form-input" placeholder="John" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="lastName">Last name</label>
          <input type="text" id="lastName" class="form-input" placeholder="Doe" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Create a strong password" required>
        <div class="password-strength" id="strengthBar">
          <div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter your password" required>
      </div>
      <div class="checkbox-wrapper">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to the <a href="terms-of-service.html" target="_blank">Terms of Service</a> and <a href="privacy-policy.html" target="_blank">Privacy Policy</a></label>
      </div>
      <button type="submit" class="auth-btn auth-btn--primary"><span>Create Account</span></button>
    </form>

    <div class="divider">
      <div class="divider-line"></div><span class="divider-text">Or</span><div class="divider-line"></div>
    </div>

    <button class="auth-btn auth-btn--google" id="googleBtn">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span>Sign up with Google</span>
    </button>

    <div class="auth-prompt">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</div>

<script>
const API = 'https://api.protevio.com/api';
const _redir = new URLSearchParams(window.location.search).get('redirect');

document.getElementById('password').addEventListener('input', function(e) {
  const password = e.target.value;
  const bars = document.querySelectorAll('.strength-bar');
  bars.forEach(bar => bar.className = 'strength-bar');
  let strength = 0;
  if (password.length >= 8) strength++;
  if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
  if (password.match(/[0-9]/)) strength++;
  if (password.match(/[^a-zA-Z0-9]/)) strength++;
  const cls = strength <= 2 ? 'weak' : strength === 3 ? 'medium' : 'strong';
  for (let i = 0; i < strength; i++) { bars[i].classList.add(cls); }
});

document.getElementById('signupForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  if (password !== confirmPassword) { showError('Passwords do not match!'); return; }
  if (!document.getElementById('terms').checked) { showError('Please accept the Terms of Service'); return; }

  const btn = this.querySelector('button[type="submit"]');
  const btnText = btn.querySelector('span');
  btnText.textContent = 'Creating account...'; btn.disabled = true;

  const firstName = document.getElementById('firstName').value;
  const lastName = document.getElementById('lastName').value;
  const email = document.getElementById('email').value;

  try {
    const res = await fetch(API + '/auth/register', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ username: email, email, password, name: firstName + ' ' + lastName })
    });
    const data = await res.json();
    if (res.ok) {
      if (data.requires_verification) {
        localStorage.setItem('protevio_verify_email', email);
        window.location.href = '/check-email?email=' + encodeURIComponent(email) + (_redir ? '&redirect=' + _redir : '');
      } else if (data.token) {
        localStorage.setItem('protevio_token', data.token);
        if(data.refresh_token) localStorage.setItem('protevio_refresh', data.refresh_token);
        localStorage.setItem('protevio_user', JSON.stringify(data.user || {username: email}));
        window.location.href = _redir === 'results' ? '/results.html' : '/login';
      } else { window.location.href = _redir === 'results' ? '/login.html?redirect=results' : '/login'; }
    } else if (res.status === 403 && data.requires_verification) {
      localStorage.setItem('protevio_verify_email', email);
      window.location.href = '/check-email?email=' + encodeURIComponent(email) + (_redir ? '&redirect=' + _redir : '');
    } else { showError(data.error || 'Registration failed.'); }
  } catch(err) { showError('Connection error.'); }
  finally { btnText.textContent = 'Create Account'; btn.disabled = false; }
});

function showError(msg) {
  let el = document.querySelector('.auth-error');
  if (!el) { el = document.createElement('div'); el.className = 'auth-error'; document.getElementById('signupForm').prepend(el); }
  el.textContent = msg; setTimeout(() => el.remove(), 5000);
}

const GOOGLE_CLIENT_ID = '902178578189-e5gmfnandrvgkqs5aeotq3vn612vc3jf.apps.googleusercontent.com';
const gsiScript = document.createElement('script');
gsiScript.src = 'https://accounts.google.com/gsi/client'; gsiScript.async = true; gsiScript.defer = true;
document.head.appendChild(gsiScript);
gsiScript.onload = () => { google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleResponse }); };

document.getElementById('googleBtn').addEventListener('click', function() {
  if (!window.google?.accounts) { showError('Google Sign-In loading...'); return; }
  google.accounts.id.prompt((n) => {
    if (n.isNotDisplayed()) {
      const div = document.createElement('div'); div.style.cssText = 'position:fixed;top:-9999px'; document.body.appendChild(div);
      google.accounts.id.renderButton(div, {type:'standard', theme:'filled_black', size:'large'});
      setTimeout(() => { const inner = div.querySelector('div[role=button]') || div.querySelector('iframe'); if (inner) inner.click(); else showError('Please allow popups'); }, 300);
    }
  });
});

async function handleGoogleResponse(response) {
  const btn = document.getElementById('googleBtn');
  btn.querySelector('span').textContent = 'Creating account...'; btn.disabled = true;
  try {
    const res = await fetch(API + '/auth/google', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ credential: response.credential }) });
    const data = await res.json();
    if (res.ok && data.token) {
      localStorage.setItem('protevio_token', data.token);
      if(data.refresh_token) localStorage.setItem('protevio_refresh', data.refresh_token);
      localStorage.setItem('protevio_user', JSON.stringify(data.user || {}));
      window.location.href = _redir === 'results' ? '/results.html' : '/dashboard';
    } else { showError(data.error || 'Google sign-up failed'); }
  } catch(err) { showError('Connection error.'); }
  finally { btn.querySelector('span').textContent = 'Sign up with Google'; btn.disabled = false; }
}
</script>
</body>
</html>
