<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — Protevio AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="protevio.css">
<link rel="stylesheet" href="auth.css">
<style>
.state { display: none; }
.state.active { display: block; }
.password-strength { display: flex; gap: 6px; margin-top: 8px; }
.strength-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; transition: background .3s; }
.strength-bar.weak { background: var(--red); }
.strength-bar.medium { background: var(--amber); }
.strength-bar.strong { background: var(--emerald); }
.password-requirements { margin: 16px 0 24px; }
.requirement {
  display: flex; align-items: center; gap: 8px;
  font-size: .78rem; color: var(--ink-muted); margin-bottom: 6px;
}
.requirement svg { width: 14px; height: 14px; stroke: var(--border); stroke-width: 2; fill: none; flex-shrink: 0; }
.requirement.met { color: var(--emerald); }
.requirement.met svg { stroke: var(--emerald); }
.success-icon {
  width: 56px; height: 56px; border-radius: 50%; background: var(--emerald-soft);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
}
.success-icon svg { width: 24px; height: 24px; stroke: var(--emerald); stroke-width: 2.5; fill: none; }
</style>
</head>
<body>
<div class="p-glow"></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div id="resetState" class="state active">
      <div class="auth-header">
        <div style="width:48px;height:48px;border-radius:50%;background:var(--blue-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
          <svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:var(--blue);stroke-width:2;fill:none;"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        </div>
        <h1 class="auth-title">Reset password</h1>
        <p class="auth-sub">Create a new strong password for your account</p>
      </div>
      <form id="resetForm">
        <div class="form-group">
          <label class="form-label" for="newPassword">New password</label>
          <input type="password" id="newPassword" class="form-input" placeholder="Enter new password" required>
          <div class="password-strength">
            <div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div>
          </div>
        </div>
        <div class="password-requirements">
          <div class="requirement" id="req-length"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>At least 8 characters</div>
          <div class="requirement" id="req-case"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>Uppercase &amp; lowercase</div>
          <div class="requirement" id="req-number"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>At least one number</div>
          <div class="requirement" id="req-special"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>At least one special character</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Re-enter new password" required>
        </div>
        <button type="submit" class="auth-btn auth-btn--primary btn-primary"><span>Reset Password</span></button>
      </form>
    </div>
    <div id="successState" class="state">
      <div class="auth-header">
        <div class="success-icon"><svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></div>
        <h1 class="auth-title">Password reset!</h1>
        <p class="auth-sub">Your password has been updated. You can now log in.</p>
      </div>
      <a href="login.html" class="auth-btn auth-btn--primary" style="text-align:center;text-decoration:none;display:block;">Go to Login</a>
    </div>
  </div>
</div>
<script>
const API = 'https://api.protevio.com/api';
const urlParams = new URLSearchParams(window.location.search);
const resetToken = urlParams.get('token');

if (!resetToken) {
  document.querySelector('.auth-sub').textContent = 'Invalid reset link. Please request a new password reset.';
  document.getElementById('resetForm').style.display = 'none';
}

const requirements = { length: false, case: false, number: false, special: false };

document.getElementById('newPassword').addEventListener('input', function(e) {
  const password = e.target.value;
  const bars = document.querySelectorAll('.strength-bar');
  bars.forEach(bar => bar.className = 'strength-bar');
  requirements.length = password.length >= 8;
  requirements.case = /[a-z]/.test(password) && /[A-Z]/.test(password);
  requirements.number = /[0-9]/.test(password);
  requirements.special = /[^a-zA-Z0-9]/.test(password);
  document.getElementById('req-length').classList.toggle('met', requirements.length);
  document.getElementById('req-case').classList.toggle('met', requirements.case);
  document.getElementById('req-number').classList.toggle('met', requirements.number);
  document.getElementById('req-special').classList.toggle('met', requirements.special);
  const metCount = Object.values(requirements).filter(Boolean).length;
  const cls = metCount <= 2 ? 'weak' : metCount === 3 ? 'medium' : 'strong';
  for (let i = 0; i < metCount; i++) { bars[i].classList.add(cls); }
});

document.getElementById('resetForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  if (!Object.values(requirements).every(Boolean)) { alert('Please meet all password requirements'); return; }
  if (newPassword !== confirmPassword) { alert('Passwords do not match!'); return; }

  const btn = this.querySelector('.btn-primary');
  const orig = btn.innerHTML;
  btn.innerHTML = '<span>Resetting...</span>'; btn.disabled = true;

  try {
    const res = await fetch(API + '/auth/reset-password', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ token: resetToken, password: newPassword })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to reset password');
    document.getElementById('resetState').classList.remove('active');
    document.getElementById('successState').classList.add('active');
  } catch(err) {
    alert(err.message || 'Failed to reset password. The link may have expired.');
    btn.innerHTML = orig; btn.disabled = false;
  }
});
</script>
</body>
</html>
